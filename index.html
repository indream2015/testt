<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박영민 - 디렉터 게이트웨이</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-purple: #8b5cf6;
            --accent-blue: #3b82f6;
            --accent-emerald: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Pretendard, "Noto Sans KR", sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            padding: 40px 20px;
        }

        /* Background Animated Glows */
        .glow-sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            opacity: 0.4;
            pointer-events: none;
        }

        .glow-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-purple) 0%, transparent 70%);
            top: -10%;
            left: -10%;
            animation: float-slow 15s ease-in-out infinite alternate;
        }

        .glow-2 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-blue) 0%, transparent 70%);
            bottom: -10%;
            right: -10%;
            animation: float-slow 18s ease-in-out infinite alternate-reverse;
        }

        @keyframes float-slow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, 40px) scale(1.15); }
        }

        /* Container */
        .gateway-wrapper {
            width: 100%;
            max-width: 1100px;
            z-index: 1;
            text-align: center;
        }

        /* Header */
        header {
            margin-bottom: 60px;
        }

        .brand-logo {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            color: var(--accent-blue);
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.2;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
            word-break: keep-all;
            font-weight: 500;
        }

        /* Navigation Grid */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 60px;
        }

        .category-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 50px 30px;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 260px; /* 설명이 빠짐에 따라 카드의 최소 높이를 콤팩트하게 조정 */
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .category-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%);
            opacity: 1;
            transition: opacity 0.4s;
        }

        /* Accent lines on hover */
        .category-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            transform: scaleX(0);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card-resume::after { background: linear-gradient(90deg, var(--accent-blue), #60a5fa); }
        .card-portfolio::after { background: linear-gradient(90deg, var(--accent-purple), #c084fc); }
        .card-media::after { background: linear-gradient(90deg, var(--accent-emerald), #34d399); }

        .category-card:hover {
            transform: translateY(-10px);
            background: rgba(30, 41, 59, 0.9);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        .card-resume:hover { border-color: rgba(59, 130, 246, 0.4); }
        .card-portfolio:hover { border-color: rgba(139, 92, 246, 0.4); }
        .card-media:hover { border-color: rgba(16, 185, 129, 0.4); }

        .category-card:hover::after {
            transform: scaleX(1);
        }

        /* Card Elements */
        .icon-box {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 1.8rem;
            transition: transform 0.4s;
        }

        .category-card:hover .icon-box {
            transform: scale(1.1) rotate(5deg);
        }

        .card-resume .icon-box { background: rgba(59, 130, 246, 0.1); color: var(--accent-blue); }
        .card-portfolio .icon-box { background: rgba(139, 92, 246, 0.1); color: var(--accent-purple); }
        .card-media .icon-box { background: rgba(16, 185, 129, 0.1); color: var(--accent-emerald); }

        .card-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 25px;
            letter-spacing: -0.02em;
        }

        .go-btn {
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 24px;
            border-radius: 30px;
            transition: all 0.3s;
        }

        .card-resume .go-btn { background: rgba(59, 130, 246, 0.1); color: var(--accent-blue); }
        .card-portfolio .go-btn { background: rgba(139, 92, 246, 0.1); color: var(--accent-purple); }
        .card-media .go-btn { background: rgba(16, 185, 129, 0.1); color: var(--accent-emerald); }

        .category-card:hover .go-btn {
            background: #ffffff;
            color: var(--bg-dark);
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }

        /* Footer */
        footer {
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 30px;
            width: 100%;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .card-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .category-card {
                min-height: auto;
                padding: 40px 25px;
            }
            h1 {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="glow-sphere glow-1"></div>
    <div class="glow-sphere glow-2"></div>

    <div class="gateway-wrapper">
        <header>
            <div class="brand-logo">PARK YOUNG MIN</div>
            <h1>Park Youngmin</h1>
            <p class="subtitle">전략적 시각과 실무 실행력을 겸비한 전문 마케터</p>
        </header>

        <nav class="card-grid">
            <a href="이력서.html" class="category-card card-resume">
                <div class="icon-box">📄</div>
                <h2 class="card-title">RESUME</h2>
                <div class="go-btn">이력서 보기 &rarr;</div>
            </a>

            <a href="포트폴리오.html" class="category-card card-portfolio">
                <div class="icon-box">💼</div>
                <h2 class="card-title">PORTFOLIO</h2>
                <div class="go-btn">포트폴리오 보기 &rarr;</div>
            </a>

            <a href="media.html" class="category-card card-media">
                <div class="icon-box">🌐</div>
                <h2 class="card-title">MEDIA</h2>
                <div class="go-btn">미디어 채널 가기 &rarr;</div>
            </a>
        </nav>

        <footer>
            <p>&copy; 2026 PARK YOUNG MIN. All Rights Reserved. Designed for Enterprise & Growth Startups.</p>
        </footer>
    </div>

</body>
</html>
